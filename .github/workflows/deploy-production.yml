name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      DEPLOY_HOST: win3bitco.in
      EXPECTED_PRODUCTION_BRANCH: main
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate production ref and capture deploy metadata
        id: preflight
        run: ./scripts/ci/production-preflight.sh

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run shared verification
        run: bun run verify

      - name: Build deploy bundle with Sentry upload
        run: bun run build:deploy

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-leading-zero-lab-production

      - name: Deploy to S3 and invalidate CloudFront
        id: deploy
        run: ./scripts/deploy-production.sh

      - name: Write deploy summary
        if: always()
        env:
          DEPLOY_BRANCH: ${{ steps.preflight.outputs.branch_name }}
          DEPLOY_SHA: ${{ steps.preflight.outputs.head_sha }}
          DEPLOY_SHORT_SHA: ${{ steps.preflight.outputs.head_short_sha }}
          DEPLOY_COMMIT_DATE: ${{ steps.preflight.outputs.commit_date }}
          INVALIDATION_ID: ${{ steps.deploy.outputs.invalidation_id }}
          DEPLOY_STATUS: ${{ job.status }}
        run: ./scripts/ci/write-deploy-summary.sh
